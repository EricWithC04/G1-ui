<!-- Barra superior del panel admin. A la izquierda el logo, a la derecha la sesion. -->
<nav class="bg-slate-950 border-b border-white/10">
  <div class="py-3 px-6 flex items-center justify-between gap-4">

    <!-- Logo de NovaTech (reemplaza al texto). routerLink lleva al inicio del panel. -->
    <a routerLink="/admin" class="flex items-center gap-3">
      <img src="logo.png" alt="NovaTech" class="h-12 w-auto" />
      <span class="text-sm text-neutral-400 hidden sm:inline">Panel de administracion</span>
    </a>

    <!-- Lado derecho: nombre del admin, link a la tienda y boton de salir. -->
    <div class="flex items-center gap-3 text-sm">
      <!-- @if: solo mostramos el nombre si hay alguien logueado. -->
      @if (auth.usuarioActual(); as u) {
        <span class="text-neutral-300 hidden sm:inline">Hola, {{ u.nombre }}</span>
      }
      <!-- Acceso para ir a ver la tienda (storefront). -->
      <a routerLink="/" class="text-neutral-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">
        Ver tienda
      </a>
      <!-- Boton para cerrar sesion. -->
      <button (click)="cerrarSesion()" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-lg">
        Cerrar sesion
      </button>
    </div>
  </div>
</nav>
