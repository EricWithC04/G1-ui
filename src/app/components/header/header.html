<!-- Barra superior del panel admin -->
<nav class="bg-slate-950/90 border-b border-white/10 backdrop-blur-md sticky top-0 z-20">
  <div class="relative py-2.5 px-4 sm:px-6 flex items-center gap-3 sm:gap-4">
    <a routerLink="/admin" class="relative z-10 flex items-center gap-3 shrink-0">
      <img src="logo.png" alt="NovaTech" class="h-10 w-auto" />
      <div class="hidden sm:block">
        <span class="text-sm font-semibold text-white">NovaTech ERP</span>
        <span class="block text-[10px] text-slate-500 uppercase tracking-wider">Administración</span>
      </div>
    </a>

    <div class="header-search-center">
      <app-header-global-search></app-header-global-search>
    </div>

    <div class="relative z-10 flex items-center gap-1.5 sm:gap-2 ml-auto shrink-0">
      <app-header-notifications></app-header-notifications>
      <app-header-crm-inbox></app-header-crm-inbox>

      @if (auth.usuarioActual(); as u) {
        <span class="text-neutral-300 hidden lg:inline text-sm max-w-[10rem] truncate">Hola, {{ u.nombre }}</span>
      }

      <a routerLink="/" class="text-neutral-300 hover:text-white px-2 sm:px-3 py-2 rounded-lg hover:bg-white/10 transition-colors text-sm hidden sm:inline">
        Ver tienda
      </a>

      <button (click)="cerrarSesion()" class="bg-gray-700 hover:bg-gray-600 text-white px-2 sm:px-3 py-2 rounded-lg text-sm">
        Cerrar sesion
      </button>
    </div>
  </div>
</nav>
