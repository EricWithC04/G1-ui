<!-- Barra superior de promociones -->
<div class="bg-blue-600 text-white text-xs text-center py-1.5 px-4 hidden sm:block">
  🚚 Envíos a todo el país &nbsp;·&nbsp; 💳 Hasta 12 cuotas &nbsp;·&nbsp; ⚡ Los mejores precios en tecnología
</div>

<!-- Header principal sticky -->
<nav class="bg-slate-950/95 backdrop-blur-sm border-b border-white/8 sticky top-0 z-30">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">

    <!-- Logo (recortado, sin margenes negras extra) -->
    <a routerLink="/" class="store-logo-link shrink-0" aria-label="Ir al inicio">
      <img src="logo.png" alt="NovaTech" />
    </a>

    <!-- Buscador central -->
    <form class="flex-1 max-w-2xl mx-auto" (ngSubmit)="buscar()">
      <div class="relative flex items-center">
        <input
          type="text"
          name="busquedaHeader"
          [(ngModel)]="busquedaHeader"
          (keyup.enter)="buscar()"
          placeholder="Buscar productos, marcas, categorías..."
          class="w-full bg-gray-800 border border-white/10 rounded-xl pl-4 pr-14 py-2.5 text-sm text-white placeholder-neutral-500 transition-colors"
        />
        <button
          type="submit"
          class="absolute right-1 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg px-3.5 py-1.5 flex items-center justify-center"
        >
          <svg lucideSearch [size]="16"></svg>
        </button>
      </div>
    </form>

    <!-- Acciones a la derecha -->
    <div class="flex items-center gap-0.5 shrink-0">

      <!-- Carrito con badge -->
      <a
        routerLink="/carrito"
        routerLinkActive="bg-white/8"
        class="relative p-2.5 text-neutral-300 hover:text-white hover:bg-white/5 rounded-xl"
        title="Mi carrito"
      >
        <svg lucideShoppingCart [size]="22"></svg>
        @if (cart.cantidadTotal() > 0) {
          <span class="absolute -top-0.5 -right-0.5 bg-blue-600 text-white text-[10px] font-bold rounded-full h-5 min-w-5 px-1 flex items-center justify-center leading-none">
            {{ cart.cantidadTotal() }}
          </span>
        }
      </a>

      @if (auth.usuarioActual(); as u) {
        <!-- Admin link -->
        @if (esRolPanelAdmin(u.rol)) {
          <a routerLink="/admin" class="hidden md:flex text-xs text-amber-300 hover:text-amber-200 px-3 py-2 rounded-xl hover:bg-white/5">
            Panel admin
          </a>
        }
        <!-- Mi cuenta -->
        <a
          routerLink="/panel-cliente"
          routerLinkActive="bg-white/8"
          class="flex items-center gap-2 text-neutral-300 hover:text-white px-3 py-2 rounded-xl hover:bg-white/5 text-sm"
        >
          <svg lucideUser [size]="20"></svg>
          <span class="hidden sm:inline max-w-24 truncate text-xs">{{ u.nombre }}</span>
        </a>
        <!-- Salir -->
        <button
          (click)="cerrarSesion()"
          class="hidden sm:block text-xs text-neutral-500 hover:text-red-400 px-2 py-2 rounded-xl hover:bg-white/5"
        >
          Salir
        </button>
      } @else {
        <a
          routerLink="/login"
          class="hidden sm:block text-sm text-neutral-300 hover:text-white px-3 py-2 rounded-xl hover:bg-white/5"
        >
          Ingresar
        </a>
        <a
          routerLink="/register"
          class="bg-blue-600 hover:bg-blue-500 text-white text-sm px-4 py-2 rounded-xl font-medium"
        >
          Registrarse
        </a>
      }
    </div>
  </div>
</nav>
