<!-- Barra superior de la tienda. Fija arriba con el logo y los accesos del cliente. -->
<nav class="bg-slate-950 border-b border-white/10 sticky top-0 z-20">
  <div class="max-w-6xl mx-auto py-3 px-4 flex items-center justify-between gap-4">

    <!-- Logo de NovaTech: al hacer clic vuelve al catalogo (home de la tienda). -->
    <a routerLink="/" class="flex items-center">
      <img src="logo.png" alt="NovaTech" class="h-12 w-auto" />
    </a>

    <!-- Links del medio. routerLinkActive marca en azul el link de la pagina actual. -->
    <div class="flex items-center gap-1 text-sm">
      <a
        routerLink="/"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="text-white bg-white/10"
        class="text-neutral-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/10 transition-colors"
      >
        Catalogo
      </a>

      <!-- Icono del carrito con un globito que muestra cuantos items hay. -->
      <a
        routerLink="/carrito"
        routerLinkActive="text-white bg-white/10"
        class="relative text-neutral-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/10 transition-colors"
        title="Carrito"
      >
        <svg lucideShoppingCart size="20"></svg>
        <!-- @if: solo mostramos el globito si hay al menos un producto en el carrito. -->
        @if (cart.cantidadTotal() > 0) {
          <span class="absolute -top-1 -right-1 bg-blue-600 text-white text-xs rounded-full h-5 min-w-5 px-1 flex items-center justify-center">
            {{ cart.cantidadTotal() }}
          </span>
        }
      </a>
    </div>

    <!-- Lado derecho: depende de si hay sesion o no. -->
    <div class="flex items-center gap-2 text-sm">
      @if (auth.usuarioActual(); as u) {
        <!-- Si el usuario es ADMIN, le mostramos un acceso directo al panel. -->
        @if (u.rol === 'ADMIN') {
          <a routerLink="/admin" class="text-amber-300 hover:text-amber-200 px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">
            Panel admin
          </a>
        }
        <!-- Menu de "Mi cuenta": perfil y pedidos. -->
        <a routerLink="/mis-pedidos" routerLinkActive="text-white bg-white/10"
           class="text-neutral-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">
          Mis pedidos
        </a>
        <a routerLink="/perfil" routerLinkActive="text-white bg-white/10"
           class="flex items-center gap-2 text-neutral-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">
          <svg lucideUser size="18"></svg>
          <span class="hidden sm:inline">{{ u.nombre }}</span>
        </a>
        <button (click)="cerrarSesion()" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-lg">
          Salir
        </button>
      } @else {
        <!-- Sin sesion: mostramos los botones de iniciar sesion y crear cuenta. -->
        <a routerLink="/login" class="text-neutral-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">
          Iniciar sesion
        </a>
        <a routerLink="/register" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg">
          Crear cuenta
        </a>
      }
    </div>
  </div>
</nav>
