<div class="header-notif">
  <button
    type="button"
    class="header-notif-btn"
    (click)="toggle()"
    [attr.aria-expanded]="abierto()"
    aria-label="Notificaciones"
    title="Notificaciones"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path>
      <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path>
    </svg>
    @if (cantidad() > 0) {
      <span class="header-notif-badge">{{ cantidad() > 99 ? '99+' : cantidad() }}</span>
    }
  </button>

  @if (abierto()) {
    <div class="header-notif-panel">
      <div class="header-notif-header">
        <span>Alertas</span>
        @if (cargando()) {
          <span class="header-notif-loading">…</span>
        }
      </div>

      @if (items().length === 0) {
        <p class="header-notif-empty">No hay alertas pendientes</p>
      } @else {
        <ul class="header-notif-list">
          @for (n of items(); track n.tipo + n.mensaje) {
            <li>
              <a [routerLink]="n.link" class="header-notif-item" (click)="cerrar()">
                <span class="header-notif-icon">{{ iconoTipo(n.tipo) }}</span>
                <span class="header-notif-body">
                  <span class="header-notif-title">{{ n.titulo }}</span>
                  <span class="header-notif-msg">{{ n.mensaje }}</span>
                </span>
              </a>
            </li>
          }
        </ul>
      }

      <div class="header-notif-footer">
        <a routerLink="/admin/pagos" class="header-notif-link" (click)="cerrar()">Ver pagos</a>
        <a routerLink="/admin/pedidos" class="header-notif-link" (click)="cerrar()">Ver pedidos</a>
        <a routerLink="/admin/creditos" class="header-notif-link" (click)="cerrar()">Ver créditos</a>
      </div>
    </div>
  }
</div>
