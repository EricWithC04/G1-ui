<div class="admin-search-bar">
  <div class="admin-search-input-wrap">
    <svg class="admin-search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input
      type="search"
      class="admin-search-input"
      [placeholder]="placeholder()"
      [ngModel]="termino()"
      (ngModelChange)="termino.set($event)"
      autocomplete="off"
    />
    @if (termino()) {
      <button type="button" class="admin-search-clear" (click)="termino.set('')" aria-label="Limpiar búsqueda">×</button>
    }
  </div>
  @if (mostrarContador() && total() > 0) {
    <span class="admin-search-count">
      @if (termino()) {
        {{ filtrados() }} de {{ total() }}
      } @else {
        {{ total() }} registros
      }
    </span>
  }
</div>
