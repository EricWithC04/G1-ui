<!-- Encabezado de inicio con el logo de NovaTech al costado del titulo. -->
<div class="flex items-center gap-4 mb-6">
  <img src="logo.png" alt="NovaTech" class="h-16 w-auto" />
  <div>
    <h1 class="text-2xl font-bold text-white mb-1">Bienvenido a Novatech Store</h1>
    <p class="text-neutral-400">Panel para administrar toda la tienda.</p>
  </div>
</div>

<!-- Fila de tarjetas con numeros rapidos (conteos). -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
  <div class="bg-gray-800 rounded-xl p-4 border border-white/10">
    <p class="text-3xl font-bold text-blue-400">{{ productos() }}</p>
    <p class="text-sm text-neutral-400">Productos</p>
  </div>
  <div class="bg-gray-800 rounded-xl p-4 border border-white/10">
    <p class="text-3xl font-bold text-blue-400">{{ usuarios() }}</p>
    <p class="text-sm text-neutral-400">Usuarios</p>
  </div>
  <div class="bg-gray-800 rounded-xl p-4 border border-white/10">
    <p class="text-3xl font-bold text-blue-400">{{ pedidos() }}</p>
    <p class="text-sm text-neutral-400">Pedidos</p>
  </div>
</div>

<!-- Tarjetas de acceso rapido: cada una lleva a un modulo. -->
<h2 class="text-lg font-semibold text-white mb-3">Modulos</h2>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  @for (acceso of accesos; track acceso.path) {
    <a
      [routerLink]="'/' + acceso.path"
      class="block bg-gray-800 hover:bg-gray-700 rounded-xl p-5 border border-white/10 transition-colors"
    >
      <p class="font-semibold text-white">{{ acceso.titulo }}</p>
      <p class="text-sm text-neutral-400">{{ acceso.desc }}</p>
    </a>
  }
</div>
