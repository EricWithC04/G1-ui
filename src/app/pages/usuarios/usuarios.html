<h1 class="text-2xl font-bold text-white mb-6">Usuarios</h1>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- Formulario para crear un usuario. -->
  <form class="bg-gray-800 border border-white/10 p-5 rounded-xl flex flex-col gap-3 h-fit" (ngSubmit)="guardar()">
    <h2 class="font-semibold text-white">Nuevo usuario</h2>

    <p class="text-xs text-neutral-400">
      Los campos con <span class="text-red-400">*</span> son obligatorios. El ID lo genera el sistema.
    </p>

    <label class="text-sm text-neutral-300">
      Nombre <span class="text-red-400">*</span>
      <input class="mt-1 w-full bg-gray-900 border border-white/10 p-2 rounded text-white"
        [(ngModel)]="form.nombre" name="nombre" required placeholder="Ej: Juan Perez">
      <span class="block text-xs text-neutral-400 mt-1">Nombre y apellido de la persona. Obligatorio.</span>
    </label>

    <label class="text-sm text-neutral-300">
      Email <span class="text-red-400">*</span>
      <input type="email" class="mt-1 w-full bg-gray-900 border border-white/10 p-2 rounded text-white"
        [(ngModel)]="form.email" name="email" required placeholder="ejemplo@correo.com">
      <span class="block text-xs text-neutral-400 mt-1">Correo unico, sirve para iniciar sesion. Formato: nombre@dominio.com. Obligatorio.</span>
    </label>

    <label class="text-sm text-neutral-300">
      Contrasena <span class="text-red-400">*</span>
      <input type="password" class="mt-1 w-full bg-gray-900 border border-white/10 p-2 rounded text-white"
        [(ngModel)]="form.contrasena" name="contrasena" placeholder="Contrasena del usuario">
      <span class="block text-xs text-neutral-400 mt-1">Se guarda encriptada (BCrypt). En alta es obligatoria; al editar, dejala vacia para no cambiarla.</span>
    </label>

    <!-- Desplegable con los dos roles posibles. -->
    <label class="text-sm text-neutral-300">
      Rol <span class="text-red-400">*</span>
      <select class="mt-1 w-full bg-gray-900 border border-white/10 p-2 rounded text-white"
        [(ngModel)]="form.rol" name="rol">
        <option value="CLIENTE">CLIENTE</option>
        <option value="ADMIN">ADMIN</option>
      </select>
      <span class="block text-xs text-neutral-400 mt-1">CLIENTE compra en la tienda; ADMIN entra al panel. Elegi uno de la lista.</span>
    </label>

    <button type="submit" class="bg-blue-600 hover:bg-blue-500 p-2 rounded text-white">Crear</button>
  </form>

  <!-- Tabla con la lista de usuarios. -->
  <div class="lg:col-span-2 bg-gray-800 border border-white/10 rounded-xl overflow-hidden">
    <table class="w-full text-sm text-left">
      <thead class="bg-gray-900 text-neutral-400">
        <tr>
          <th class="px-4 py-3">ID</th>
          <th class="px-4 py-3">Nombre</th>
          <th class="px-4 py-3">Email</th>
          <th class="px-4 py-3">Rol</th>
          <th class="px-4 py-3 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (item of items(); track item.idUsuario) {
          <tr class="border-t border-white/10 text-neutral-200">
            <td class="px-4 py-3">{{ item.idUsuario }}</td>
            <td class="px-4 py-3">{{ item.nombre }}</td>
            <td class="px-4 py-3 text-neutral-400">{{ item.email }}</td>
            <td class="px-4 py-3">
              <span class="px-2 py-1 rounded text-xs"
                [class]="item.rol === 'ADMIN' ? 'bg-purple-600/30 text-purple-300' : 'bg-blue-600/30 text-blue-300'">
                {{ item.rol }}
              </span>
            </td>
            <td class="px-4 py-3 text-right">
              <button (click)="borrar(item.idUsuario)" class="text-red-400 hover:text-red-300">Borrar</button>
            </td>
          </tr>
        }
        @if (items().length === 0) {
          <tr><td colspan="5" class="px-4 py-4 text-neutral-500">No hay usuarios.</td></tr>
        }
      </tbody>
    </table>
  </div>
</div>
