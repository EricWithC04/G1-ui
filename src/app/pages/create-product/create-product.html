<div class="h-screen flex flex-col">
    <app-header></app-header>
    <div class="flex flex-1 justify-center items-center bg-gray-900">
        <div class="w-120 flex flex-col mt-10 bg-gray-700 p-6 rounded-lg">

            <h1 class="text-2xl text-gray-50 font-bold mb-6">
                Crear producto
            </h1>

            <form class="flex flex-col gap-4 text-gray-50" /* (ngSubmit)="guardarProducto()" */>

                <input class="border p-2 rounded" type="text" placeholder="Proveedor" /* [(ngModel)]="product.nombre" */
                    name="proveedor">

                <input class="border p-2 rounded" type="text" placeholder="Nombre" /* [(ngModel)]="product.nombre" */
                    name="nombre">

                <textarea class="border p-2 rounded" placeholder="Descripción" /* [(ngModel)]="product.descripcion" */
                    name="descripcion"></textarea>

                <input class="border p-2 rounded" type="number" placeholder="Precio" /* [(ngModel)]="product.precio" */
                    name="precio">

                <button class="bg-blue-600 p-3 rounded text-white">

                    Guardar producto

                </button>

            </form>

        </div>
    </div>
</div>
