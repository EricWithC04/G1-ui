<!-- Encabezado de la pagina: titulo + buscador + boton para crear. -->
<div class="flex flex-wrap items-center justify-between gap-3 mb-6">
  <h2 class="text-xl font-semibold text-white">
    {{ products().length }} productos
  </h2>

  <div class="flex items-center gap-2">
    <!-- Buscador: al escribir y apretar Enter (o el boton) filtra por nombre.
         [(ngModel)] conecta el input con la variable "busqueda" del componente. -->
    <input
      type="text"
      [(ngModel)]="busqueda"
      (keyup.enter)="cargar()"
      placeholder="Buscar por nombre..."
      class="bg-gray-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-neutral-500"
    />
    <button (click)="cargar()" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-lg text-sm">
      Buscar
    </button>
    <button (click)="nuevo()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm">
      + Nuevo producto
    </button>
  </div>
</div>

<!-- Grilla de tarjetas de producto.
     Recorremos la lista y por cada producto dibujamos una tarjeta. -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
  @for (product of products(); track product.idProducto) {
    <app-product-card
      [product]="product"
      (editar)="editar($event)"
      (borrar)="borrar($event)"
    ></app-product-card>
  }
</div>

<!-- Mensaje por si no hay productos para mostrar. -->
@if (products().length === 0) {
  <p class="text-neutral-400 mt-6">No hay productos para mostrar.</p>
}
