<!-- Pantalla de registro: misma estetica que el login. -->
<div class="min-h-screen bg-gray-900 text-gray-100 flex flex-col items-center justify-center px-4 py-8">

  <!-- Logo de NovaTech arriba del formulario, centrado. -->
  <a routerLink="/" class="mb-6">
    <img src="logo.png" alt="NovaTech" class="h-24 w-auto" />
  </a>

  <!-- Tarjeta con el formulario. -->
  <div class="w-full max-w-sm bg-gray-800 border border-white/10 rounded-2xl p-6 shadow-xl">
    <h1 class="text-xl font-semibold text-white mb-1">Crear cuenta</h1>
    <p class="text-sm text-neutral-400 mb-5">Registrate para empezar a comprar.</p>

    <form (ngSubmit)="registrarse()" class="flex flex-col gap-4">

      <!-- Campo nombre -->
      <div>
        <label class="block text-sm text-neutral-300 mb-1">Nombre completo</label>
        <input
          type="text"
          name="nombre"
          [(ngModel)]="nombre"
          required
          placeholder="Ej: Juan Perez"
          class="w-full bg-gray-900 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-neutral-500"
        />
      </div>

      <!-- Campo email -->
      <div>
        <label class="block text-sm text-neutral-300 mb-1">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          placeholder="tucorreo@ejemplo.com"
          class="w-full bg-gray-900 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-neutral-500"
        />
      </div>

      <!-- Campo contrasena -->
      <div>
        <label class="block text-sm text-neutral-300 mb-1">Contrasena</label>
        <input
          type="password"
          name="contrasena"
          [(ngModel)]="contrasena"
          required
          placeholder="Elegi una contrasena"
          class="w-full bg-gray-900 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-neutral-500"
        />
      </div>

      @if (error()) {
        <p class="text-sm text-red-400">{{ error() }}</p>
      }

      <button
        type="submit"
        [disabled]="cargando()"
        class="bg-blue-600 hover:bg-blue-500 disabled:opacity-60 text-white px-4 py-2 rounded-lg font-medium"
      >
        {{ cargando() ? 'Creando...' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="text-sm text-neutral-400 mt-5 text-center">
      Ya tenes cuenta?
      <a routerLink="/login" class="text-blue-400 hover:text-blue-300">Iniciar sesion</a>
    </p>
  </div>
</div>
