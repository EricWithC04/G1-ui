<h1 class="text-2xl font-bold text-white mb-6">Mi perfil</h1>

@if (cargando()) {
  <p class="text-neutral-400">Cargando tus datos...</p>
} @else {
  <div class="max-w-lg bg-gray-800 border border-white/10 rounded-2xl p-6">
    <form (ngSubmit)="guardar()" class="flex flex-col gap-4">

      <!-- Campo nombre -->
      <div>
        <label class="block text-sm text-neutral-300 mb-1">Nombre completo</label>
        <input
          type="text"
          name="nombre"
          [(ngModel)]="nombre"
          required
          placeholder="Ej: Juan Perez"
          class="w-full bg-gray-900 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-neutral-500"
        />
      </div>

      <!-- Campo email -->
      <div>
        <label class="block text-sm text-neutral-300 mb-1">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          placeholder="tucorreo@ejemplo.com"
          class="w-full bg-gray-900 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-neutral-500"
        />
      </div>

      <!-- Campo contrasena nueva (opcional) -->
      <div>
        <label class="block text-sm text-neutral-300 mb-1">Nueva contrasena (opcional)</label>
        <input
          type="password"
          name="nuevaContrasena"
          [(ngModel)]="nuevaContrasena"
          placeholder="Dejala vacia si no la queres cambiar"
          class="w-full bg-gray-900 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-neutral-500"
        />
        <p class="text-xs text-neutral-500 mt-1">Si la completas, se guarda encriptada (BCrypt) en el backend.</p>
      </div>

      @if (guardado()) {
        <p class="text-sm text-green-400">Cambios guardados correctamente.</p>
      }
      @if (error()) {
        <p class="text-sm text-red-400">{{ error() }}</p>
      }

      <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg font-medium self-start">
        Guardar cambios
      </button>
    </form>
  </div>
}
