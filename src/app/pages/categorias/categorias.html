<h1 class="text-2xl font-bold text-white mb-6">Categorias</h1>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- Columna 1: formulario para crear una categoria. -->
  <form class="bg-gray-800 border border-white/10 p-5 rounded-xl flex flex-col gap-3 h-fit" (ngSubmit)="guardar()">
    <h2 class="font-semibold text-white">Nueva categoria</h2>

    <!-- Aclaracion: el ID lo genera el sistema y los campos con * son obligatorios. -->
    <p class="text-xs text-neutral-400">
      Los campos con <span class="text-red-400">*</span> son obligatorios. El ID lo genera el sistema.
    </p>

    <label class="text-sm text-neutral-300">
      Nombre <span class="text-red-400">*</span>
      <input class="mt-1 w-full bg-gray-900 border border-white/10 p-2 rounded text-white"
        [(ngModel)]="form.nombre" name="nombre" required placeholder="Ej: Notebooks">
      <span class="block text-xs text-neutral-400 mt-1">Nombre corto de la categoria. Obligatorio. Ej: Perifericos.</span>
    </label>

    <label class="text-sm text-neutral-300">
      Descripcion
      <textarea class="mt-1 w-full bg-gray-900 border border-white/10 p-2 rounded text-white"
        [(ngModel)]="form.descripcion" name="descripcion" placeholder="Ej: Teclados, mouse y accesorios"></textarea>
      <span class="block text-xs text-neutral-400 mt-1">Detalle de que productos agrupa. Texto libre, opcional.</span>
    </label>

    <button type="submit" class="bg-blue-600 hover:bg-blue-500 p-2 rounded text-white">Crear</button>
  </form>

  <!-- Columnas 2 y 3: tabla con la lista de categorias. -->
  <div class="lg:col-span-2 bg-gray-800 border border-white/10 rounded-xl overflow-hidden">
    <table class="w-full text-sm text-left">
      <thead class="bg-gray-900 text-neutral-400">
        <tr>
          <th class="px-4 py-3">ID</th>
          <th class="px-4 py-3">Nombre</th>
          <th class="px-4 py-3">Descripcion</th>
          <th class="px-4 py-3 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <!-- Una fila por cada categoria. -->
        @for (item of items(); track item.idCategoria) {
          <tr class="border-t border-white/10 text-neutral-200">
            <td class="px-4 py-3">{{ item.idCategoria }}</td>
            <td class="px-4 py-3">{{ item.nombre }}</td>
            <td class="px-4 py-3 text-neutral-400">{{ item.descripcion }}</td>
            <td class="px-4 py-3 text-right">
              <button (click)="borrar(item.idCategoria)" class="text-red-400 hover:text-red-300">Borrar</button>
            </td>
          </tr>
        }
        <!-- Fila de aviso si la lista esta vacia. -->
        @if (items().length === 0) {
          <tr><td colspan="4" class="px-4 py-4 text-neutral-500">No hay categorias.</td></tr>
        }
      </tbody>
    </table>
  </div>
</div>
