# Configuracion de Nginx para servir la app de Angular.
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location ~ ^/(productos|categorias|usuarios|auth|perfiles|carritos|detalle-carritos|detalle-pedidos|pedidos|pagos|envios|resenas|planes|plan-cuotas|ordenes|facturas|presupuestos|remitos|dashboard|configuracion|crm|plantillas|listas-precios|campanas|promociones|rbac|health|config|cuotas|interacciones|ordenes-compra|listas-precios|actuator|ping) {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/admin/(buscar|notificaciones)$ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
